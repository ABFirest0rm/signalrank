methodology_summary: >
  SignalRank uses a two-phase hybrid ranking pipeline. Offline scripts parse candidate JSONL,
  compute availability features, and precompute BGE embeddings for candidate job-history text
  and JD-derived query probes. The final CPU-only ranker loads local parquet/npy artifacts,
  computes semantic must-have scores, applies behavioral/seniority multipliers, and writes a
  validator-ready top-100 CSV with candidate-specific reasoning. The final ranking step uses
  no network, no hosted LLM APIs, and no GPU.